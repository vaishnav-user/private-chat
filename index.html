<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Couple Chat</title>
    <!-- Favicon link (uses logo as fallback) -->
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .loader-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            height: 100vh;
            width: 100vw;
            z-index: 100;
            position: relative;
        }
        .heart-loader {
            position: relative;
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            animation: heartPulse 1.2s infinite ease-in-out;
        }
        .heart-loader::before,
        .heart-loader::after {
            content: '';
            position: absolute;
            top: 0;
            width: 52px;
            height: 80px;
            border-radius: 50px 50px 0 0;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
        }
        .heart-loader::before {
            left: 50px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }
        .heart-loader::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }
        @keyframes heartPulse {
            0% { transform: scale(1); }
            14% { transform: scale(1.12); }
            28% { transform: scale(1); }
            42% { transform: scale(1.12); }
            70% { transform: scale(1); }
        }
        .loading-text {
            font-family: var(--font-heading);
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: white;
            opacity: 0.8;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="bg-decorations" id="bgDecorations"></div>
    
    <div class="loader-wrapper">
        <div class="heart-loader"></div>
        <div class="loading-text">Connecting to your love...</div>
    </div>

    <!-- Firebase SDK & Custom Scripts -->
    <script type="module" src="js/firebase.js"></script>
    <script type="module">
        import { auth, onAuthStateChanged } from './js/firebase.js';

        // Check authentication state
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // User is signed in, check if authorized
                const email = user.email || '';
                if (email === 'vaishnav@privatechat.local' || email === 'chikku@privatechat.local') {
                    window.location.replace('chat.html');
                } else {
                    // Logged in but not authorized, redirect to login page (auth will clear it)
                    window.location.replace('login.html?error=unauthorized');
                }
            } else {
                // User is not signed in, redirect to login page
                window.location.replace('login.html');
            }
        });

        // Generate floating hearts background decoration
        const container = document.getElementById('bgDecorations');
        for (let i = 0; i < 15; i++) {
            const heart = document.createElement('span');
            heart.classList.add('floating-heart');
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDelay = Math.random() * 8 + 's';
            heart.style.animationDuration = 6 + Math.random() * 8 + 's';
            container.appendChild(heart);
        }
    </script>
</body>
</html>
